name: CI

on:
  push:
    branches:
      - main
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/**"
      - ".github/actions/**"
      - "cmd/**"
      - "internal/**"
      - "pkg/**"
  pull_request:
    branches:
      - main
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/**"
      - ".github/actions/**"
      - "cmd/**"
      - "internal/**"
      - "pkg/**"

env:
  ARTIFACT_RETENTION_DAYS: "7"
  COVERAGE_FILE: "coverage.out"
  COVERAGE_RETENTION_DAYS: "1"
  SARIF_FORMAT: "sarif"
  SECURITY_SEVERITY: "HIGH,CRITICAL"
  TRIVY_SARIF_FILE: "trivy-results.sarif"

jobs:
  lint:
    name: Code linting
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go environment
        uses: ./.github/actions/setup-go

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: latest
          args: --timeout=5m

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go environment
        uses: ./.github/actions/setup-go

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: "/language:go"

  gitguardian:
    name: GitGuardian scan
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: GitGuardian Scan
        uses: GitGuardian/ggshield-action@da20be06cafe5e8633dc24744efe1efe8d30f06b # v1.52.2
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  trivy:
    name: Trivy SCA scan
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Run Trivy (SCA)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln"
          severity: ${{ env.SECURITY_SEVERITY }}
          exit-code: "1"
          format: ${{ env.SARIF_FORMAT }}
          output: ${{ env.TRIVY_SARIF_FILE }}

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: ${{ env.TRIVY_SARIF_FILE }}

      - name: Upload Trivy artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: trivy-report
          path: ${{ env.TRIVY_SARIF_FILE }}
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  sonarcloud:
    name: SonarCloud analysis
    runs-on: ubuntu-24.04-arm
    needs: [lint, codeql, trivy, gitguardian]
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup Go environment
        uses: ./.github/actions/setup-go

      - name: Run tests with coverage
        run: |
          go test ./... \
          -coverprofile=${{ env.COVERAGE_FILE }} \
          -covermode=atomic \
          -race

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: ${{ env.COVERAGE_FILE }}
          retention-days: ${{ env.COVERAGE_RETENTION_DAYS }}

      - name: Display coverage
        run: go tool cover -func=${{ env.COVERAGE_FILE }}

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  codecov:
    name: Codecov upload
    runs-on: ubuntu-24.04-arm
    needs: sonarcloud
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: ./${{ env.COVERAGE_FILE }}
          fail_ci_if_error: true
          verbose: true
          flags: unittests
          name: terrax-coverage
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build_test:
    name: Build & Test (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    needs: sonarcloud
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go environment
        uses: ./.github/actions/setup-go

      - name: Build verification
        env:
          GOARCH: ${{ matrix.arch }}
        run: go build -v .

      - name: Run tests
        run: go test ./...
